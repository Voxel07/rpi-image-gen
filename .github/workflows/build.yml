  # ---------------------------------------------------------------------------
  # miliz-tv custom image
  # ---------------------------------------------------------------------------
  # Required GitHub Secrets (Settings → Secrets and variables → Actions):
  #   MILIZ_WIFI_SSID         Wi-Fi network name
  #   MILIZ_WIFI_PASSWORD     Wi-Fi password
  #   MILIZ_SSH_PUBKEY        SSH public key for user miliz
  #   MILIZ_CONNECT_AUTHKEY   Raspberry Pi Connect auth key (deprecated)
  #   MILIZ_CONNECT_API_TOKEN Raspberry Pi Connect Management API token
  #   MILIZ_RUSTDESK_SERVER   RustDesk relay server hostname
  #   MILIZ_RUSTDESK_KEY      RustDesk relay server public key
  # ---------------------------------------------------------------------------
  build-miliz-tv:
    name: build miliz-tv image (arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    # Only run on push/workflow_dispatch (not on PRs from forks — secrets unavailable)
    if: github.event_name != 'pull_request'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Check out rpi-image-gen into ./rpi-image-gen/
      - name: checkout rpi-image-gen
        uses: actions/checkout@v4
        with:
          path: rpi-image-gen

      # 2. Check out the miliz-tv layer repo into ./miliz-tv/  (sibling directory)
      #    token is required because rpi-img-miliz is a private repository
      - name: checkout miliz-tv layer
        uses: actions/checkout@v4
        with:
          repository: Voxel07/rpi-img-miliz
          token: ${{ secrets.GH_PAT }}
          path: miliz-tv

      # 3. Install build dependencies (must run from the rpi-image-gen root)
      - name: install dependencies
        working-directory: rpi-image-gen
        run: |
          sudo apt-get update
          sudo ./install_deps.sh

      # 4. Build the miliz-tv image
      #    -S ../miliz-tv/      → same relative path as the local dev command
      #    -c miliz-tv.yaml     → config file inside miliz-tv/config/
      #    -- key=value ...     → override all secrets; avoids storing them in the repo
      - name: build miliz-tv image
        working-directory: rpi-image-gen
        env:
          MILIZ_WIFI_SSID: ${{ secrets.MILIZ_WIFI_SSID }}
          MILIZ_WIFI_PASSWORD: ${{ secrets.MILIZ_WIFI_PASSWORD }}
          MILIZ_SSH_PUBKEY: ${{ secrets.MILIZ_SSH_PUBKEY }}
          MILIZ_CONNECT_API_TOKEN: ${{ secrets.MILIZ_CONNECT_API_TOKEN }}
          MILIZ_RUSTDESK_SERVER: ${{ secrets.MILIZ_RUSTDESK_SERVER }}
          MILIZ_RUSTDESK_KEY: ${{ secrets.MILIZ_RUSTDESK_KEY }}
        run: |
          ./rpi-image-gen build \
            -S ../miliz-tv/ \
            -c miliz-tv.yaml \
            -- \
            IGconf_tv_wifi_ssid="$MILIZ_WIFI_SSID" \
            IGconf_tv_wifi_password="$MILIZ_WIFI_PASSWORD" \
            IGconf_ssh_pubkey_user1="$MILIZ_SSH_PUBKEY" \
            IGconf_tv_connect_api_token="$MILIZ_CONNECT_API_TOKEN" \
            IGconf_rustdesk_server="$MILIZ_RUSTDESK_SERVER" \
            IGconf_rustdesk_key="$MILIZ_RUSTDESK_KEY"

      # 5. Upload the built image as a workflow artifact
      #    rpi-image-gen writes the image to work/image-<name>/
      - name: upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: miliz-tv-image
          path: rpi-image-gen/work/image-miliz-tv/miliz-tv.img
          if-no-files-found: error
          retention-days: 30

